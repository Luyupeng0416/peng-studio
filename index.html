    tr.classList.add('open');
  }
}

// ===== 粒子背景 =====
(function() {
  var canvas = document.getElementById('particle-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var particles = [];
  var mouse = {x: null, y: null, radius: 150};
  var isLowEnd = navigator.hardwareConcurrency <= 2 || (navigator.deviceMemory && navigator.deviceMemory <= 4);
  var targetFPS = isLowEnd ? 30 : 60;
  var frameInterval = 1000 / targetFPS;
  var lastFrameTime = 0;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  var mouseRafId = null, pendingMouseX = null, pendingMouseY = null;
  window.addEventListener('mousemove', function(e) {
    pendingMouseX = e.x;
    pendingMouseY = e.y;
    if (!mouseRafId) {
      mouseRafId = requestAnimationFrame(function() {
        mouse.x = pendingMouseX;
        mouse.y = pendingMouseY;
        mouseRafId = null;
      });
    }
  });

  function Particle() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = (Math.random() - 0.5) * 0.6;
    this.size = Math.random() * 2.2 + 0.6;
    this.density = (Math.random() * 30) + 1;
    this.opacity = Math.random() * 0.5 + 0.25;
  }
  Particle.prototype.update = function() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
    if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;
    var dx = mouse.x - this.x, dy = mouse.y - this.y;
    var distance = Math.sqrt(dx * dx + dy * dy);
    if (distance < mouse.radius) {
      var force = (mouse.radius - distance) / mouse.radius;
      this.x -= (dx / distance) * force * this.density * 0.6;
      this.y -= (dy / distance) * force * this.density * 0.6;
    }
  };
  Particle.prototype.draw = function() {
    ctx.fillStyle = 'rgba(255,215,0,' + this.opacity + ')';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  };

  function initParticles() {
    particles = [];
    var n = Math.min(Math.floor((canvas.width * canvas.height) / 24000), 100);
    for (var i = 0; i < n; i++) particles.push(new Particle());
  }
  initParticles();

  var animId;
  function animateParticles(timestamp) {
    if (timestamp - lastFrameTime < frameInterval) {
      animId = requestAnimationFrame(animateParticles);
      return;
    }
    lastFrameTime = timestamp;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < particles.length; i++) {
      particles[i].update();
      particles[i].draw();
    }
    animId = requestAnimationFrame(animateParticles);
  }
  animateParticles(0);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      cancelAnimationFrame(animId);
    } else {
      lastFrameTime = 0;
      animateParticles(0);
    }
  });

  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      resizeCanvas();
      initParticles();
    }, 300);
  });
})();

// ===== 卡片3D倾斜 =====
(function() {
  var card = document.getElementById('mainCard');
  if (!card) return;
  var wrapper = document.querySelector('.simple-wrapper');
  if (!wrapper || window.innerWidth <= 768) return;
  wrapper.addEventListener('mousemove', function(e) {
    var rect = card.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    var centerX = rect.width / 2, centerY = rect.height / 2;
    var rotateX = ((y - centerY) / centerY) * -4;
    var rotateY = ((x - centerX) / centerX) * 4;
    card.style.transform = 'perspective(1000px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) scale3d(1.01,1.01,1.01)';
    card.style.transition = 'transform 0.1s ease-out';
  });
  wrapper.addEventListener('mouseleave', function() {
    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1,1,1)';
    card.style.transition = 'transform 0.5s ease-out';
  });
})();

// ===== 彩带效果 =====
(function() {
  var c = [];
  var S = 150;
  var colors = ['#FFD54F', '#FF6B6B', '#FFE0B2', '#fff', '#BDB5CC', '#c0392b', '#4CAF50', '#2196F3'];
  for (var i = 0; i < S; i++) {
    c.push({x: 0, y: 0, w: 0, h: 0, color: '', speedY: 0, speedX: 0, rotation: 0, rotationSpeed: 0, active: false});
  }
  window.triggerConfetti = function() {
    var cv = document.getElementById('confetti-canvas');
    if (!cv) return;
    var cx = cv.getContext('2d');
    cv.width = window.innerWidth;
    cv.height = window.innerHeight;
    var ac = 0;
    for (var i = 0; i < S && ac < 150; i++) {
      var p = c[i];
      p.x = Math.random() * cv.width;
      p.y = Math.random() * cv.height - cv.height;
      p.w = Math.random() * 10 + 5;
      p.h = Math.random() * 5 + 3;
      p.color = colors[Math.floor(Math.random() * colors.length)];
      p.speedY = Math.random() * 3 + 2;
      p.speedX = Math.random() * 2 - 1;
      p.rotation = Math.random() * 360;
      p.rotationSpeed = Math.random() * 10 - 5;
      p.active = true;
      ac++;
    }
    var ai, fc = 0;
    function r() {
      cx.clearRect(0, 0, cv.width, cv.height);
      var ha = false;
      for (var i = 0; i < S; i++) {
        var p = c[i];
        if (!p.active) continue;
        p.y += p.speedY;
        p.x += p.speedX;
        p.rotation += p.rotationSpeed;
        if (p.y < cv.height) {
          ha = true;
        } else {
          p.active = false;
          continue;
        }
        cx.save();
        cx.translate(p.x, p.y);
        cx.rotate(p.rotation * Math.PI / 180);
        cx.fillStyle = p.color;
        cx.globalAlpha = Math.max(0, 1 - (p.y / cv.height));
        cx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        cx.restore();
      }
      fc++;
      if (ha && fc < 300) {
        ai = requestAnimationFrame(r);
      } else {
        cx.clearRect(0, 0, cv.width, cv.height);
        for (var i = 0; i < S; i++) c[i].active = false;
      }
    }
    r();
    setTimeout(function() {
      if (ai) cancelAnimationFrame(ai);
      cx.clearRect(0, 0, cv.width, cv.height);
      for (var i = 0; i < S; i++) c[i].active = false;
    }, 5000);
  };
})();

// ===== 支付成功检测 =====
(function() {
  function getParam(n) {
    var r = new RegExp('(^|&)' + n + '=([^&]*)(&|$)');
    var m = window.location.search.substr(1).match(r);
    return m ? decodeURIComponent(m[2]) : '';
  }
  var paid = getParam('paid');
  if (paid === '1') {
    var price = getParam('price') || '0';
    var product = getParam('product') || '';
    document.getElementById('shop').style.display = 'none';
    document.getElementById('submit_buy').style.display = 'none';
    var notice = document.getElementById('paid-notice');
    notice.style.display = 'block';
    if (product) {
      document.getElementById('paid-product-info').textContent = '已购买：' + product + '  |  ￥' + price;
    }
    // 彩带
    if (typeof triggerConfetti === 'function') triggerConfetti();
  }
})();

// ===== 复制微信号 =====
function copyWechat() {
  var text = document.getElementById('wechat-id').textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.querySelector('.paid-copy-btn');
      btn.textContent = '已复制!';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
    });
  } else {
    // Fallback for older browsers
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var btn = document.querySelector('.paid-copy-btn');
    btn.textContent = '已复制!';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  }
}
